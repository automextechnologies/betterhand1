version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: betterhand_redis
    ports:
      - "6379:6379"
    restart: always

  web:
    build: .
    container_name: betterhand_web
    command: daphne -b 0.0.0.0 -p 8000 core.asgi:application
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    restart: always

  celery:
    build: .
    container_name: betterhand_celery
    command: celery -A core worker -l info
    env_file:
      - .env
    depends_on:
      - redis
    restart: always
